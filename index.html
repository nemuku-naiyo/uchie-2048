<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>うーちー2048</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf6ee;--panel:#f0e2cc;--border:#c8965a;--accent:#2c1a0e;--empty:#e4d0b0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Zen Maru Gothic',sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(8px + env(safe-area-inset-top,0px)) calc(10px + env(safe-area-inset-right,0px)) calc(8px + env(safe-area-inset-bottom,0px)) calc(10px + env(safe-area-inset-left,0px));}
.container{width:100%;max-width:460px;display:flex;flex-direction:column;gap:5px;}
.header{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.title-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0;cursor:pointer;}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.title-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-uchie{font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;color:var(--accent);white-space:nowrap;}
.logo-2048{font-family:'Kaisei Decol',serif;font-size:0.72rem;font-weight:700;color:var(--border);letter-spacing:.1em;white-space:nowrap;}
.title-hint{font-size:.46rem;color:var(--border);}
.header-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.scores{display:flex;gap:5px;}
.score-box{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:3px 8px;text-align:center;min-width:50px;}
.score-label{font-size:.46rem;font-weight:700;color:var(--border);letter-spacing:.08em;text-transform:uppercase;}
.score-value{font-size:.85rem;font-weight:900;color:var(--accent);}
.score-value.bump{animation:bump .2s ease-out;}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.btn-mute{background:var(--panel);border:2px solid var(--border);border-radius:7px;width:28px;height:28px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.controls{display:flex;justify-content:space-between;align-items:center;}
.hint{font-size:.6rem;color:var(--border);font-weight:500;}
.btn-new{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:5px 11px;font-family:'Zen Maru Gothic',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;}
.btn-new:active{transform:scale(.95);}
.board-wrap{background:var(--panel);border:3px solid var(--border);border-radius:14px;padding:8px;position:relative;overflow:hidden;flex-shrink:0;}
@keyframes shake-left{0%{transform:translateX(0)}40%{transform:translateX(-7px)}100%{transform:translateX(0)}}
@keyframes shake-right{0%{transform:translateX(0)}40%{transform:translateX(7px)}100%{transform:translateX(0)}}
@keyframes shake-up{0%{transform:translateY(0)}40%{transform:translateY(-7px)}100%{transform:translateY(0)}}
@keyframes shake-down{0%{transform:translateY(0)}40%{transform:translateY(7px)}100%{transform:translateY(0)}}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;height:100%;}
.cell{background:var(--empty);border-radius:8px;}
.tiles-layer{position:absolute;top:8px;left:8px;right:8px;bottom:8px;pointer-events:none;}
.tile{border-radius:8px;display:flex;align-items:flex-end;justify-content:center;position:absolute;overflow:hidden;box-shadow:0 2px 6px rgba(44,26,14,.25);background-size:cover;background-position:center;border:2px solid #aaa;transition:left .12s cubic-bezier(.25,.46,.45,.94),top .12s cubic-bezier(.25,.46,.45,.94);}
.tile.new-tile{animation:tileIn .18s cubic-bezier(.34,1.56,.64,1);}
@keyframes tileIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.tile.merged-tile{animation:tilePop .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes tilePop{0%{transform:scale(1)}45%{transform:scale(1.18)}100%{transform:scale(1)}}
.tile-num{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-weight:900;line-height:1;color:#fff;white-space:nowrap;z-index:2;text-shadow:-1.5px -1.5px 0 #1a0a00,1.5px -1.5px 0 #1a0a00,-1.5px 1.5px 0 #1a0a00,1.5px 1.5px 0 #1a0a00,0 2px 4px rgba(0,0,0,.8);}
.slide-arrow{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;pointer-events:none;z-index:20;opacity:0;}
.slide-arrow.go-left{animation:goL .3s ease-out forwards;}
.slide-arrow.go-right{animation:goR .3s ease-out forwards;}
.slide-arrow.go-up{animation:goU .3s ease-out forwards;}
.slide-arrow.go-down{animation:goD .3s ease-out forwards;}
@keyframes goL{0%{opacity:.8;transform:translateX(16px)}100%{opacity:0;transform:translateX(-28px)}}
@keyframes goR{0%{opacity:.8;transform:translateX(-16px)}100%{opacity:0;transform:translateX(28px)}}
@keyframes goU{0%{opacity:.8;transform:translateY(16px)}100%{opacity:0;transform:translateY(-28px)}}
@keyframes goD{0%{opacity:.8;transform:translateY(-16px)}100%{opacity:0;transform:translateY(28px)}}
.overlay{position:absolute;inset:0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;backdrop-filter:blur(5px);z-index:10;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.visible{opacity:1;pointer-events:all;}
.overlay-win{background:rgba(212,160,64,.9);}
.overlay-lose{background:rgba(44,26,14,.9);}
.ov-em{font-size:2rem;animation:ovEm .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes ovEm{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.ov-title{font-family:'Kaisei Decol',serif;font-size:1.5rem;font-weight:700;color:#fdf6ee;}
.ov-sub{font-size:.78rem;color:rgba(253,246,238,.9);}
.ov-btn{background:#fdf6ee;color:var(--accent);border:none;border-radius:8px;padding:7px 16px;font-family:'Zen Maru Gothic',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}
.footer{text-align:center;font-size:.58rem;color:var(--border);}
.ptcl{position:fixed;pointer-events:none;z-index:200;font-size:1rem;animation:ptclFly var(--d,.5s) ease-out forwards;}
@keyframes ptclFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}}
.sc-add{position:fixed;font-size:.85rem;font-weight:900;color:var(--accent);pointer-events:none;animation:scUp .8s ease-out forwards;z-index:100;}
@keyframes scUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-30px)}}
#unlock{position:fixed;inset:0;background:rgba(44,26,14,.6);z-index:300;display:flex;align-items:center;justify-content:center;}
#unlock .box{background:#fdf6ee;border-radius:16px;padding:22px 26px;text-align:center;max-width:250px;}
#unlock .em{font-size:2rem;margin-bottom:8px;}
#unlock p{font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:12px;line-height:1.5;}
#unlock button{background:var(--accent);color:#fdf6ee;border:none;border-radius:9px;padding:8px 22px;font-family:'Zen Maru Gothic',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;}
#zukan-modal{position:fixed;inset:0;z-index:400;display:flex;align-items:flex-end;justify-content:center;background:rgba(44,26,14,.5);opacity:0;pointer-events:none;transition:opacity .25s;}
#zukan-modal.visible{opacity:1;pointer-events:all;}
.zukan-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:16px 14px 24px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);}
#zukan-modal.visible .zukan-sheet{transform:translateY(0);}
.zukan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;}
.zukan-title{font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.zukan-close{background:var(--panel);border:2px solid var(--border);border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zukan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.zk-card{background:var(--panel);border-radius:10px;overflow:hidden;}
.zk-img{width:100%;aspect-ratio:1;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;justify-content:center;border-bottom:3px solid #ccc;}
.zk-num{font-weight:900;font-size:.85rem;color:#fff;margin-bottom:3px;text-shadow:-1.5px -1.5px 0 #1a0a00,1.5px -1.5px 0 #1a0a00,-1.5px 1.5px 0 #1a0a00,1.5px 1.5px 0 #1a0a00;}
.zk-label{font-size:.55rem;font-weight:700;color:var(--accent);text-align:center;padding:4px 3px 5px;line-height:1.3;}
.zk-card.locked .zk-img{background-image:none!important;background-color:#1a0a00;border-color:#3a2a1a!important;}
.zk-card.locked .zk-img::before{content:"？";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.6rem;font-weight:900;color:#5a4a3a;font-family:'Kaisei Decol',serif;}
.zk-card.locked .zk-num{display:none;}
.zk-card.locked .zk-label{color:#a08060;}
.zk-card.locked .zk-label .zk-label-text{display:none;}
.zk-card.locked .zk-label::before{content:"???";}
.zk-card.just-unlocked{animation:unlockPop .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes unlockPop{0%{transform:scale(.8);filter:brightness(2)}50%{transform:scale(1.1);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
</style></head><body>

</div>

[2,4,8,16,32,64,128,256,512,1024,2048,4096,8192].forEach(function(v){var z=document.getElementById("zki-"+v);if(z)z.style.backgroundImage="url("+TILE_IMGS[v]+")";});

function fitBoard(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var sz=Math.min(Math.min(vw-20,460),vh-130);
  if(sz<180)sz=180;
  var bw=document.getElementById("board-wrap");
  bw.style.width=sz+"px";bw.style.height=sz+"px";
  draw();
}
var AC=null,muted=false;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function unlockAC(){initAC();var b=AC.createBuffer(1,1,22050),s=AC.createBufferSource();s.buffer=b;s.connect(AC.destination);s.start(0);if(AC.state==="suspended")AC.resume();}
function beep(freq,type,vol,dur,f0){if(muted||!AC)return;try{var o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;if(f0){o.frequency.setValueAtTime(f0,AC.currentTime);o.frequency.exponentialRampToValueAtTime(freq,AC.currentTime+dur*0.3);}else o.frequency.setValueAtTime(freq,AC.currentTime);g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur+0.01);}catch(e){}}
function sndSlide(){beep(280,"sine",0.06,0.08,400);}
function sndMerge(v){var b=280+Math.log2(Math.max(v,2))*28;beep(b,"triangle",0.10,0.15);setTimeout(function(){beep(b*1.26,"sine",0.08,0.15);},50);setTimeout(function(){beep(b*1.5,"triangle",0.06,0.18);},110);}
function sndNew(){beep(700,"sine",0.03,0.07,500);}
function sndOver(){var fs=[280,230,190,150];[0,120,260,440].forEach(function(t,i){setTimeout(function(){beep(fs[i],"sawtooth",0.06,0.18);},t);});}
function sndWin(){[[523,0],[659,130],[784,260],[1047,420]].forEach(function(x){setTimeout(function(){beep(x[0],"triangle",0.10,0.28);},x[1]);});}
document.getElementById("btn-unlock").addEventListener("click",function(){unlockAC();document.getElementById("unlock").style.display="none";setTimeout(function(){beep(600,"sine",0.08,0.12);},50);setTimeout(function(){beep(800,"sine",0.08,0.12);},180);});
document.getElementById("btn-mute").addEventListener("click",function(){muted=!muted;document.getElementById("btn-mute").textContent=muted?"🔇":"🔊";});
document.getElementById("title-wrap").addEventListener("click",function(){document.getElementById("zukan-modal").classList.add("visible");});
document.getElementById("zukan-close").addEventListener("click",function(){document.getElementById("zukan-modal").classList.remove("visible");});
document.getElementById("zukan-modal").addEventListener("click",function(e){if(e.target===this)this.classList.remove("visible");});
var best=parseInt(localStorage.getItem("u2048b")||"0");
document.getElementById("best").textContent=best;
var unlocked={};try{unlocked=JSON.parse(localStorage.getItem("u2048unlocked")||"{}");}catch(e){unlocked={};}
var ZUKAN_VALUES=[2,4,8,16,32,64,128,256,512,1024,2048,4096,8192];
function applyZukan(){ZUKAN_VALUES.forEach(function(v){var card=document.getElementById("zki-"+v);if(!card)return;var parent=card.parentElement;if(unlocked[v])parent.classList.remove("locked");else parent.classList.add("locked");});}
function unlockTile(v){if(unlocked[v])return false;unlocked[v]=1;localStorage.setItem("u2048unlocked",JSON.stringify(unlocked));var card=document.getElementById("zki-"+v);if(card){var parent=card.parentElement;parent.classList.remove("locked");parent.classList.add("just-unlocked");setTimeout(function(){parent.classList.remove("just-unlocked");},700);}return true;}
applyZukan();
var PTCL=["✨","⭐","💕","🌸","🎵","🐾","🌟","🍀"];
var activePtcl=0,PTCL_MAX=16;
function burst(el,n){if(activePtcl>=PTCL_MAX)return;n=Math.min(n,PTCL_MAX-activePtcl);var r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;for(var i=0;i<n;i++){activePtcl++;var p=document.createElement("div");p.className="ptcl";p.textContent=PTCL[Math.floor(Math.random()*PTCL.length)];var a=Math.random()*Math.PI*2,d=30+Math.random()*50;p.style.setProperty("--tx",Math.cos(a)*d+"px");p.style.setProperty("--ty",Math.sin(a)*d-30+"px");p.style.setProperty("--d",(0.4+Math.random()*0.3)+"s");p.style.left=cx+"px";p.style.top=cy+"px";document.body.appendChild(p);setTimeout(function(){p.remove();activePtcl--;},800);}}
var N=4,board,score,won,cont,merged,fresh;
function init(){board=[];for(var r=0;r<N;r++){board[r]=[];for(var c=0;c<N;c++)board[r][c]=0;}score=0;won=false;cont=false;merged={};fresh={};document.getElementById("ov-win").classList.remove("visible");document.getElementById("ov-lose").classList.remove("visible");syncScore();spawnTile();spawnTile();draw();}
function spawnTile(){var e=[];for(var r=0;r<N;r++)for(var c=0;c<N;c++)if(!board[r][c])e.push([r,c]);if(!e.length)return null;var rc=e[Math.floor(Math.random()*e.length)];board[rc[0]][rc[1]]=Math.random()<0.9?2:4;return rc;}
function syncScore(bump){document.getElementById("score").textContent=score;if(score>best){best=score;localStorage.setItem("u2048b",best);}document.getElementById("best").textContent=best;if(bump){var s=document.getElementById("score");s.classList.remove("bump");void s.offsetWidth;s.classList.add("bump");}}
function fs(v,w){var l=String(v).length,b=w*0.27;return l<=2?b:l===3?b*0.8:l===4?b*0.65:b*0.52;}
function draw(){
  if(!board)return;
  var layer=document.getElementById("tiles-layer");
  var boardEl=document.getElementById("board");
  if(!boardEl.children.length)for(var i=0;i<16;i++){var cl=document.createElement("div");cl.className="cell";boardEl.appendChild(cl);}
  layer.innerHTML="";
  var cells=boardEl.querySelectorAll(".cell");
  var lr=layer.getBoundingClientRect();
  var cellRects=[];
  for(var ci=0;ci<16;ci++){var cr=cells[ci].getBoundingClientRect();cellRects.push({w:cr.width,h:cr.height,l:cr.left-lr.left,t:cr.top-lr.top});}
  var newTiles=[];
  for(var r=0;r<N;r++)for(var c=0;c<N;c++){
    var v=board[r][c];if(!v)continue;
    var vk=Math.min(v,8192);
    unlockTile(vk);
    var rect=cellRects[r*N+c];
    var t=document.createElement("div"),key=r*N+c;
    var isNew=!!fresh[key],isMerged=!!merged[key];
    t.className="tile"+(isMerged?" merged-tile":"");
    if(TILE_IMGS[vk])t.style.backgroundImage="url("+TILE_IMGS[vk]+")";
    if(TILE_BORDERS[vk])t.style.borderColor=TILE_BORDERS[vk];
    t.style.width=rect.w+"px";t.style.height=rect.h+"px";
    t.style.left=rect.l+"px";t.style.top=rect.t+"px";
    if(isNew){t.style.transform="scale(0)";t.style.opacity="0";}
    var num=document.createElement("div");num.className="tile-num";num.style.fontSize=fs(v,rect.w)+"px";num.textContent=v;
    t.appendChild(num);layer.appendChild(t);
    if(isNew)newTiles.push(t);
    if(isMerged)burst(t,v>=512?3:2);
  }
  if(newTiles.length){requestAnimationFrame(function(){requestAnimationFrame(function(){newTiles.forEach(function(el){el.classList.add("new-tile");el.style.transform="";el.style.opacity="";});});});}
  merged={};fresh={};
}
function slideRow(row){var a=[],sc=0,i;for(i=0;i<N;i++)if(row[i])a.push(row[i]);for(i=0;i<a.length-1;i++)if(a[i]===a[i+1]){a[i]*=2;sc+=a[i];a[i+1]=0;}a=a.filter(function(x){return x;});while(a.length<N)a.push(0);return{row:a,score:sc};}
function rotR(m){return m[0].map(function(_,i){return m.map(function(r){return r[i];}).reverse();});}
function rotL(m){return m[0].map(function(_,i){return m.map(function(r){return r[r.length-1-i];});});}
function copyB(b){return b.map(function(r){return r.slice();});}
function move(dir){
  var b=copyB(board);
  if(dir==="up")b=rotL(b);
  if(dir==="right")b=b.map(function(r){return r.slice().reverse();});
  if(dir==="down")b=rotR(b);
  var moved=false,total=0,r,c,nm={};
  for(r=0;r<N;r++){var orig=b[r].slice(),res=slideRow(b[r]);if(res.row.join()!==orig.join())moved=true;for(c=0;c<N;c++){if(res.row[c]&&res.row[c]!==orig[c]){var br=r,bc=c;if(dir==="up"){br=c;bc=N-1-r;}else if(dir==="right"){bc=N-1-c;}else if(dir==="down"){br=N-1-c;bc=r;}nm[br*N+bc]=1;}}b[r]=res.row;total+=res.score;}
  if(dir==="up")b=rotR(b);
  if(dir==="right")b=b.map(function(r){return r.slice().reverse();});
  if(dir==="down")b=rotL(b);
  if(!moved)return;
  board=b;score+=total;merged=nm;
  var bw=document.getElementById("board-wrap");
  bw.style.animation="none";void bw.offsetWidth;bw.style.animation="shake-"+dir+" .18s ease-out";
  var ar=document.getElementById("slide-arrow");
  ar.textContent={left:"←",right:"→",up:"↑",down:"↓"}[dir];
  ar.className="slide-arrow";void ar.offsetWidth;ar.classList.add("go-"+dir);
  if(total>0){sndMerge(total);syncScore(true);showAdd(total);}else{sndSlide();syncScore(false);}
  var pos=spawnTile();if(pos){var nf={};nf[pos[0]*N+pos[1]]=1;fresh=nf;sndNew();}
  draw();
  var r2,c2,found=false;
  if(!won){for(r2=0;r2<N&&!found;r2++)for(c2=0;c2<N&&!found;c2++)if(board[r2][c2]===2048){won=true;found=true;if(!cont)(function(){setTimeout(function(){sndWin();document.getElementById("ov-win").classList.add("visible");},300);})();}}
  if(!canMove())setTimeout(function(){sndOver();document.getElementById("ov-lose").classList.add("visible");},300);
}
function canMove(){for(var r=0;r<N;r++)for(var c=0;c<N;c++){if(!board[r][c])return true;if(c<N-1&&board[r][c]===board[r][c+1])return true;if(r<N-1&&board[r][c]===board[r+1][c])return true;}return false;}
function showAdd(v){var el=document.createElement("div");el.className="sc-add";el.textContent="+"+v;var rr=document.getElementById("score").getBoundingClientRect();el.style.left=rr.left+"px";el.style.top=rr.top+"px";document.body.appendChild(el);setTimeout(function(){el.remove();},900);}
document.addEventListener("keydown",function(e){var m={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right"};if(m[e.key]){e.preventDefault();move(m[e.key]);}});
var sx,sy,bw2=document.getElementById("board-wrap");
bw2.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
bw2.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;move(Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up"));});
document.getElementById("btn-new").addEventListener("click",init);
document.getElementById("btn-restart-win").addEventListener("click",init);
document.getElementById("btn-restart-lose").addEventListener("click",init);
document.getElementById("btn-continue").addEventListener("click",function(){cont=true;document.getElementById("ov-win").classList.remove("visible");});
window.addEventListener("resize",fitBoard);
init();fitBoard();
</script></body></html>
